<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="120" x2="640" y2="120" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="0" y1="240" x2="640" y2="240" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="360" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="360" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="360" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Nodes -->
  <circle cx="160" cy="120" r="8" fill="#6366f1" opacity="0.6"/>
  <circle cx="320" cy="80"  r="10" fill="#818cf8" opacity="0.8"/>
  <circle cx="480" cy="120" r="8" fill="#6366f1" opacity="0.6"/>
  <circle cx="120" cy="220" r="7" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="260" cy="200" r="9" fill="#38bdf8" opacity="0.7"/>
  <circle cx="400" cy="220" r="8" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="540" cy="200" r="7" fill="#38bdf8" opacity="0.5"/>
  <!-- Lines -->
  <line x1="160" y1="120" x2="320" y2="80"  stroke="#6366f1" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="320" y1="80"  x2="480" y2="120" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="120" y1="220" x2="260" y2="200" stroke="#0ea5e9" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="260" y1="200" x2="400" y2="220" stroke="#0ea5e9" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="400" y1="220" x2="540" y2="200" stroke="#0ea5e9" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="160" y1="120" x2="260" y2="200" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="320" y1="80"  x2="400" y2="220" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="480" y1="120" x2="540" y2="200" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Label -->
  <text x="320" y="310" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#818cf8" text-anchor="middle" opacity="0.7">LLMs &amp; Modelos</text>
</svg>
