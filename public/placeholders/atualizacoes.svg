<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <!-- Circular arrows (update icon) -->
  <circle cx="320" cy="150" r="70" fill="none" stroke="#10b981" stroke-opacity="0.3" stroke-width="2"/>
  <circle cx="320" cy="150" r="50" fill="none" stroke="#34d399" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Arc -->
  <path d="M 260 150 A 60 60 0 1 1 310 211" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polygon points="305,225 325,205 315,200" fill="#10b981"/>
  <!-- Small dots orbiting -->
  <circle cx="320" cy="82"  r="5" fill="#34d399" opacity="0.8"/>
  <circle cx="388" cy="150" r="4" fill="#10b981" opacity="0.6"/>
  <!-- Pulse rings -->
  <circle cx="320" cy="150" r="90"  fill="none" stroke="#10b981" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="320" cy="150" r="110" fill="none" stroke="#10b981" stroke-opacity="0.05" stroke-width="1"/>
  <text x="320" y="310" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#34d399" text-anchor="middle" opacity="0.7">Atualizações</text>
</svg>
