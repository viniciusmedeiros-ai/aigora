<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <!-- Code block -->
  <rect x="140" y="90" width="360" height="180" rx="10" fill="#1e1b4b" fill-opacity="0.6" stroke="#ec4899" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- Traffic lights -->
  <circle cx="168" cy="115" r="6" fill="#f87171" opacity="0.7"/>
  <circle cx="190" cy="115" r="6" fill="#fbbf24" opacity="0.7"/>
  <circle cx="212" cy="115" r="6" fill="#34d399" opacity="0.7"/>
  <!-- Code lines -->
  <rect x="160" y="140" width="120" height="8" rx="3" fill="#ec4899" fill-opacity="0.5"/>
  <rect x="160" y="158" width="80"  height="8" rx="3" fill="#a78bfa" fill-opacity="0.4"/>
  <rect x="176" y="176" width="140" height="8" rx="3" fill="#38bdf8" fill-opacity="0.4"/>
  <rect x="176" y="194" width="100" height="8" rx="3" fill="#a78bfa" fill-opacity="0.3"/>
  <rect x="160" y="212" width="60"  height="8" rx="3" fill="#ec4899" fill-opacity="0.5"/>
  <!-- Cursor blink -->
  <rect x="230" y="212" width="3" height="10" rx="1" fill="#ec4899" opacity="0.9"/>
  <text x="320" y="310" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f472b6" text-anchor="middle" opacity="0.7">Tutoriais &amp; Práticas</text>
</svg>
