<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <ellipse cx="320" cy="165" rx="180" ry="120" fill="url(#glow)"/>
  <!-- Triangle / Anthropic-like shape -->
  <polygon points="320,80 420,230 220,230" fill="none" stroke="#818cf8" stroke-opacity="0.5" stroke-width="2"/>
  <polygon points="320,108 400,220 240,220" fill="#6366f1" fill-opacity="0.08"/>
  <!-- Nodes at triangle vertices -->
  <circle cx="320" cy="80"  r="6" fill="#818cf8"/>
  <circle cx="420" cy="230" r="6" fill="#6366f1"/>
  <circle cx="220" cy="230" r="6" fill="#818cf8"/>
  <circle cx="320" cy="165" r="8" fill="#6366f1" opacity="0.7"/>
  <!-- Connecting dotted lines to center -->
  <line x1="320" y1="80"  x2="320" y2="160" stroke="#818cf8" stroke-opacity="0.3" stroke-dasharray="4,4" stroke-width="1"/>
  <line x1="420" y1="230" x2="325" y2="168" stroke="#6366f1" stroke-opacity="0.3" stroke-dasharray="4,4" stroke-width="1"/>
  <line x1="220" y1="230" x2="315" y2="168" stroke="#818cf8" stroke-opacity="0.3" stroke-dasharray="4,4" stroke-width="1"/>
  <text x="320" y="310" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#818cf8" text-anchor="middle" opacity="0.7">Claude &amp; Anthropic</text>
</svg>
