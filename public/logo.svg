<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 70" width="260" height="70" role="img" aria-label="AIgora">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Círculo externo -->
  <circle cx="35" cy="35" r="28" fill="none" stroke="url(#brand)" stroke-width="2.5"/>

  <!-- Conexões da rede neural -->
  <line x1="35" y1="16" x2="19" y2="45" stroke="url(#brand)" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="35" y1="16" x2="51" y2="45" stroke="url(#brand)" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="19" y1="45" x2="51" y2="45" stroke="#0EA5E9"    stroke-width="1.5" stroke-opacity="0.55"/>

  <!-- Nós da rede neural -->
  <circle cx="35" cy="16" r="4.5" fill="#6366F1"/>
  <circle cx="19" cy="45" r="4.5" fill="#818CF8"/>
  <circle cx="51" cy="45" r="4.5" fill="#0EA5E9"/>

  <!-- Wordmark: "AI" bold gradient + "gora" light dark -->
  <text x="78"  y="50" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="800" fill="url(#textGrad)">AI</text>
  <text x="126" y="50" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="300" fill="#1E293B">gora</text>
</svg>
