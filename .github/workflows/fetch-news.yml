name: Fetch News

on:
  schedule:
    # Roda a cada 6 horas (00h, 06h, 12h, 18h UTC)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch RSS feeds
        run: node scripts/fetch-rss.mjs

      - name: Commit new articles
        run: |
          git config user.name "AIgora Bot"
          git config user.email "bot@aigora.vercel.app"
          git add src/content/noticias/
          # Só commita se tiver mudanças
          git diff --cached --quiet || git commit -m "chore: atualização automática de notícias [skip ci]"
          git push
